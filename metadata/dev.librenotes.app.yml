AutoName: LibreNotes
Description: |-
  Private, self-hosted, end-to-end encrypted note-taking. Your notes
  live on your own server — no cloud accounts, no tracking, no
  third-party services.

  Supports Markdown with live preview, offline-first operation (syncs
  when the server is reachable), end-to-end encryption
  (XChaCha20-Poly1305 + Argon2id), and a conflict resolution UI when
  two devices edit the same note simultaneously.

  Includes a trash bin with restore and permanent delete, propagated
  across devices. Designed for a single owner with multiple devices.

  Requires a self-hosted LibreNotes sync server running on your LAN
  (Dart + SQLite, single compiled binary). For remote access, add
  devices and the server to a Tailscale or WireGuard mesh — no server
  code changes needed.

  All source code is AGPLv3.

