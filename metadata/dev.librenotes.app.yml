Categories:
  - Writing
License: AGPL-3.0-only
AuthorName: Piliii
SourceCode: https://github.com/Piliii/LibreNotes
IssueTracker: https://github.com/Piliii/LibreNotes/issues

AutoName: LibreNotes

RepoType: git
Repo: https://github.com/Piliii/LibreNotes

Builds:
  - versionName: 1.0.1
    versionCode: 1
    commit: cb4bb9666c9205c560e8662a8b26885c04aed8b6
    subdir: clients/app
    output: build/app/outputs/flutter-apk/app-release.apk
    srclibs:
      - flutter@stable
    prebuild:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter config --no-analytics
      - $$flutter$$/bin/flutter pub get
    scanignore:
      - packages/notally_core
    scandelete:
      - clients/app/.pub-cache
    build:
      - export PUB_CACHE=$(pwd)/.pub-cache
      - $$flutter$$/bin/flutter build apk --release --target-platform=android-arm64

AutoUpdateMode: Version
UpdateCheckMode: Tags
UpdateCheckData: clients/app/pubspec.yaml|version:\s.+\+(\d+)|.|version:\s(.+)\+
CurrentVersion: 1.0.1
CurrentVersionCode: 1
